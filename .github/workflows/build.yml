name: Build & Release (Windows + Android)

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

env:
  FLUTTER_VERSION: "3.41.9"

jobs:
  # ----------------------------- Windows -----------------------------
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Pub get
        run: flutter pub get

      - name: Build Windows Release
        run: flutter build windows --release

      - name: Pack
        id: pack
        shell: pwsh
        run: |
          $src = "build\windows\x64\runner\Release"
          if (-not (Test-Path $src)) { throw "Release folder not found: $src" }
          # Release 资产名不带时间戳 / sha; artifact 名中可附加以区分不同 run.
          $zip = "BananaThermal-windows-x64.zip"
          Compress-Archive -Path "$src\*" -DestinationPath $zip -Force
          "zip_name=$zip" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Upload windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: ${{ steps.pack.outputs.zip_name }}
          if-no-files-found: error
          retention-days: 30

  # ----------------------------- Android -----------------------------
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Pub get
        run: flutter pub get

      # 注意: Windows 上 flutter build apk 不加 --target 时 frontend_server 会因反斜杠失败,
      # Linux runner 无此坑, 但为统一与本地命令一致, 仍显式传入.
      - name: Build APK (split per ABI, release)
        run: flutter build apk --release --target=lib/main.dart --split-per-abi

      - name: Rename APKs
        id: pack
        shell: bash
        run: |
          set -e
          mkdir -p dist
          for abi in armeabi-v7a arm64-v8a x86_64; do
            src="build/app/outputs/flutter-apk/app-${abi}-release.apk"
            dst="dist/BananaThermal-android-${abi}.apk"
            cp "$src" "$dst"
            echo "Packed $dst"
          done
          ls -lh dist/

      - name: Upload android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: dist/*.apk
          if-no-files-found: error
          retention-days: 30

  # ----------------- Android universal APK (release only) -----------------
  # 普通 push 仍保留 split-per-abi 三件套作为 artifacts; 仅在打 tag 发布
  # release 时构建一个 universal APK, 让 release 只挂一个全能 apk + windows zip.
  build-android-universal:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Pub get
        run: flutter pub get

      - name: Build universal APK (release)
        run: flutter build apk --release --target=lib/main.dart

      - name: Rename APK
        id: pack
        shell: bash
        run: |
          set -e
          mkdir -p dist
          src="build/app/outputs/flutter-apk/app-release.apk"
          dst="dist/BananaThermal-android.apk"
          cp "$src" "$dst"
          ls -lh dist/

      - name: Upload universal apk
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-universal
          path: dist/*.apk
          if-no-files-found: error
          retention-days: 30

  # ----------------------------- Release -----------------------------
  # 仅打 tag 触发. 只挂载: 一个 windows zip + 一个 universal apk.
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-windows, build-android-universal]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # checkout 全量历史 + 所有 tags, 让 `git log PREV..CURR` 能拿到两个 tag 之间
      # 的 commit 标题集合, 生成简洁更新日志.
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Download windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-zip
          path: release-assets

      - name: Download android universal apk
        uses: actions/download-artifact@v4
        with:
          name: android-apk-universal
          path: release-assets

      - name: List assets
        run: ls -lh release-assets/

      # 生成简洁更新日志: 收集上一个 tag 到当前 tag 之间的 commit 标题.
      # 若是首个 tag (找不到 PREV), 则取该 tag 自身所有历史 commit 的标题.
      - name: Generate changelog
        id: changelog
        shell: bash
        run: |
          set -euo pipefail
          CURR="${GITHUB_REF_NAME}"
          # 找上一个 tag (按提交时间倒序, 排除当前 tag).
          PREV="$(git tag --sort=-creatordate --merged "$CURR" | grep -vx "$CURR" | head -n1 || true)"

          {
            echo "## 🍌 BananaThermal $CURR"
            echo
            if [ -n "$PREV" ]; then
              echo "**自 \`$PREV\` 以来的更新**"
              echo
              git log --no-merges --pretty=format:'- %s (%h)' "$PREV..$CURR"
            else
              echo "**首个 release · 历史所有提交**"
              echo
              git log --no-merges --pretty=format:'- %s (%h)' "$CURR"
            fi
            echo
            echo
            echo "---"
            echo
            echo "### 📦 下载"
            echo "- **Windows**: \`BananaThermal-windows-x64.zip\` — 解压后运行 \`banana_thermal.exe\`"
            echo "- **Android**: \`BananaThermal-android.apk\` — universal apk, 三 ABI 通用"
            if [ -n "$PREV" ]; then
              echo
              echo "**Full Changelog**: https://github.com/${GITHUB_REPOSITORY}/compare/${PREV}...${CURR}"
            fi
          } > release-notes.md

          echo "----- release-notes.md -----"
          cat release-notes.md
          echo "----------------------------"

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          body_path: release-notes.md
