name: banana_thermal
description: "BananaThermal Studio - 跨平台热成像 + 可见光双光上位机 (Flutter 桌面版)"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # 串口 (Windows/macOS/Linux 桌面跨平台). 0.6.0 修复了 AGP 8+ 的 namespace 兼容.
  flutter_libserialport: ^0.6.0

  # 串口 (Android USB Host, CDC-ACM/CH34x/FTDI/CP210x). 仅 Android 运行时使用,
  # 桌面构建会忽略, 不会与 flutter_libserialport 冲突.
  usb_serial: ^0.5.2

  # 实时图表
  fl_chart: ^0.69.0

  # 状态管理
  provider: ^6.1.2

  # 文件选择 / 保存
  file_picker: ^8.1.4
  path_provider: ^2.1.5
  path: ^1.9.0

  # 图像处理 (Dart 纯实现; JPEG 解码 / 缩放 / 滤镜)
  image: ^4.3.0

  collection: ^1.18.0

  # Win32 ffi helper (Utf16 / calloc), 仅用于设置页的窗口尺寸调整,
  # 避免引入 window_manager 等会与串口插件冲突的 native plugin.
  ffi: ^2.1.0
  shared_preferences: ^2.5.5

  # 相册导出 (Android MediaStore / iOS Photos). 桌面端不会调用此 API,
  # 仅 Android 分支使用, 桌面构建忽略.
  gal: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # 一键生成所有平台的 App 图标 (Android adaptive + macOS).
  # 用法: dart run flutter_launcher_icons
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  # 源图: 香蕉 emoji (Twemoji CC BY 4.0) 合成在橙色渐变圆角底上, 1024x1024.
  # 生成脚本: tools/make_emoji_icon.py
  image_path: "assets/icons/icon_emoji.png"
  # Android: 覆盖 mipmap 各密度 + adaptive icon (Android 8.0+).
  android: true
  adaptive_icon_background: "#FF7043"
  adaptive_icon_foreground: "assets/icons/icon_emoji.png"
  # macOS: 顺手补一个, 桌面 Linux 默认走 .desktop / Windows 已有 ico, 跳过.
  macos:
    generate: true
    image_path: "assets/icons/icon_emoji.png"
  # Windows / iOS 不在本次目标内, 保持现有资源.
  windows:
    generate: false
  ios: false

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/
    - assets/icons/
  fonts:
    - family: SmileySans
      fonts:
        - asset: assets/fonts/SmileySans-Oblique.ttf
